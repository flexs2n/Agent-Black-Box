name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'
  GO_VERSION: '1.23'
  PNPM_VERSION: '9.6.0'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run lint

  typecheck:
    name: TypeCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @blackbox/diff-engine run build
      - run: pnpm run typecheck

  test-ts:
    name: Test (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @blackbox/diff-engine run build
      - run: pnpm --filter diff-engine run test
      - run: pnpm --filter diff-service run test
      - run: pnpm --filter web run test
      - run: pnpm --filter sdk-typescript run test
      - run: pnpm --filter "./packages/cli" run test

  test-python:
    name: Test (Python SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: 'latest'
      - run: cd packages/sdk-python && uv sync --group dev
      - run: cd packages/sdk-python && uv run ruff check src
      - run: cd packages/sdk-python && uv run mypy src
      - run: cd packages/sdk-python && uv run pytest

  test-go:
    name: Test (Go)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - run: cd apps/api && go mod download
      - run: cd apps/api && go test ./...

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test-ts, test-python, test-go]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

  integration:
    name: Integration Test (SQLite + DuckDB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && go build ./cmd/server
      - run: |
          cd apps/api
          mkdir -p data
          DATABASE_URL="./data/test.db" \
          DUCKDB_PATH="./data/test.duckdb" \
          SECRET_KEY="test-secret-key" \
          DIFF_SERVICE_URL="http://localhost:5001" \
          LOG_LEVEL="debug" \
          timeout 30s ./server &
          SERVER_PID=$!
          sleep 5
          curl -f http://localhost:4000/healthz
          kill $SERVER_PID

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true