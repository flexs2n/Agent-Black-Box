name: Agent Regression

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      baseline-label:
        description: 'Baseline label'
        required: false
        default: 'main'
      min-similarity:
        description: 'Minimum similarity score (0-100)'
        required: false
        default: '80'

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.6.0'

jobs:
  regression:
    name: Regression Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - run: pnpm install --frozen-lockfile

      - name: Build and start API server
        run: |
          cd apps/api
          go build -o server ./cmd/server
          mkdir -p data
          DATABASE_URL="./data/test.db" \
          SECRET_KEY="test-secret-key" \
          DIFF_SERVICE_URL="http://localhost:5001" \
          LOG_LEVEL="debug" \
          ./server &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV
          sleep 3
          for i in 1 2 3 4 5; do
            if curl -sf http://localhost:4000/healthz > /dev/null 2>&1; then
              echo "API server is healthy"
              break
            fi
            echo "Waiting for API server... attempt $i"
            sleep 2
          done

      - name: Run agent test
        run: |
          cd packages/sdk-typescript
          npx tsx src/test.ts 2>&1 || true
        env:
          BLACKBOX_BASE_URL: http://localhost:4000
          BLACKBOX_API_KEY: ${{ secrets.BLACKBOX_API_KEY }}

      - name: Assert similarity vs baseline
        uses: ./.github/actions/agent-regression
        with:
          api-key: ${{ secrets.BLACKBOX_API_KEY }}
          project-id: ${{ secrets.BLACKBOX_PROJECT_ID }}
          baseline-label: ${{ github.event.inputs.baseline-label || 'main' }}
          min-similarity: ${{ github.event.inputs.min-similarity || '80' }}
          base-url: http://localhost:4000

      - name: Cleanup
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
